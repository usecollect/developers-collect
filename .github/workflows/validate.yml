name: Validate OpenAPI

on:
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'openapi.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate OpenAPI spec
        run: npx @redocly/cli lint openapi.yaml --skip-rule no-unused-components
