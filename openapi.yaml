    Message:
      type: object
      description: |
        A message associated with a request. Supports three channels: **internal** (visible in the interface only), **email**, and **sms** (sent to the request's contact).
        
        **Internal messages** use `title`, `text`, and `updatedAt`. The `text` field supports markdown; raw HTML is not allowed and content is sanitized to prevent XSS attacks.
        
        **Email and SMS messages** use `title` (subject for email), `body`, `status`, and `sendOn`. Possible `status` values include `pending`, `paused`, `sending`, `sent`, `opened`, `clicked`, `creditMissing` (SMS), `phoneError` (SMS).
      properties:
        id:
          type: string
          description: Unique identifier for the message
          example: msg_123
        requestId:
          type: string
          description: The ID of the request this message belongs to
          example: req_456
        channel:
          type: string
          enum: [internal, email, sms]
          description: Message channel. Internal messages are interface-only; email and SMS are sent to the contact.
        title:
          type: string
          description: Title/subject. Used for internal and email; for email must be at least 10 characters. Not used for SMS.
          example: AI Agent - reply sent
        text:
          type: string
          nullable: true
          description: |
            Message content for internal channel only (supports markdown). Can be `null` if no text.
            Raw HTML is not allowed and all content is sanitized to prevent XSS attacks.
          example: Here is the response generated by the agent...
        body:
          type: string
          description: Message body for email and SMS channels. Must be at least 20 characters when creating or updating.
        status:
          type: string
          description: For email/SMS only. e.g. pending, paused, sending, sent, opened, clicked, creditMissing, phoneError
          example: pending
        sendOn:
          type: string
          format: date-time
          description: For email/SMS only. When the message is (or was) scheduled to be sent (ISO 8601, UTC).
          example: 2026-02-06T10:00:00.000Z
        createdAt:
          type: string
          format: date-time
          description: When the message was created (ISO 8601 format, UTC)
          example: 2026-01-21T10:12:46.120Z
        updatedAt:
          type: string
          format: date-time
          description: When the message was last updated (ISO 8601 format, UTC). Present for internal messages.
          example: 2026-01-21T10:12:46.120Z
