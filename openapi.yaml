    post:
      tags:
        - Requests
      operationId: create-request-message
      summary: Create Message
      description: |
        Create a new message on a request. Supports three channels: **internal** (default), **email**, and **sms**.

        **internal (default):** Creates an internal message visible in the interface only. Same behavior as before. Use `title` and optionally `text`.

        **email:** Sends an email to the request's contact. Requires accreditation on your account. Returns 403 if not enabled. Requires `title` (min 10 characters) and `body` (min 20 characters). Optional `sendOn` (ISO 8601) to schedule; if omitted, message is sent immediately.

        **sms:** Sends an SMS to the request's contact. Requires accreditation and available SMS credits. Returns 403 if not enabled or no SMS capability. Requires `body` (min 20 characters). Optional `sendOn` to schedule.

        Possible `status` values on creation for email/SMS: `pending` (queued, will be sent at sendOn), `creditMissing` (SMS only, no credits), `phoneError` (SMS only, contact has no valid phone).
      parameters:
        - name: requestId
          in: path
          required: true
          description: The ID of the request
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  enum: [internal, email, sms]
                  default: internal
                  description: One of internal, email, sms. Defaults to internal if omitted.
                title:
                  type: string
                  minLength: 10
                  description: Required for internal and email. For email, must be at least 10 characters. Not used for sms.
                text:
                  type: string
                  nullable: true
                  description: Text content for internal channel only (supports markdown). Not used for email/sms.
                body:
                  type: string
                  minLength: 20
                  description: Required for email and sms. Must be at least 20 characters.
                sendOn:
                  type: string
                  format: date-time
                  description: For email and sms only. Schedule the message for a future date (ISO 8601). Must be in the future. If omitted, the message is sent immediately.
            examples:
              internal:
                summary: Internal message
                value:
                  channel: internal
                  title: AI Agent - reply sent
                  text: Here is the response generated by the agent...
              email:
                summary: Email message
                value:
                  channel: email
                  title: Your email subject here
                  body: Your message body with at least twenty characters.
                  sendOn: 2026-02-06T10:00:00.000Z
              sms:
                summary: SMS message
                value:
                  channel: sms
                  body: Your SMS body with at least twenty characters.
      responses:
        '201':
          description: Message created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              examples:
                internal:
                  summary: Internal message response
                  value:
                    id: abc123
                    requestId: req456
                    channel: internal
                    title: Your title
                    text: Your text or null
                    createdAt: 2026-02-06T10:00:00.000Z
                    updatedAt: 2026-02-06T10:00:00.000Z
                emailOrSms:
                  summary: Email or SMS message response
                  value:
                    id: abc123
                    requestId: req456
                    channel: email
                    title: Your email subject
                    body: Your message body
                    status: pending
                    sendOn: 2026-02-06T10:00:00.000Z
                    createdAt: 2026-02-06T10:00:00.000Z
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
