  '/requests/{requestId}/export':
    get:
      tags:
        - Requests
      operationId: export-request-pdf
      summary: Export request in PDF
      description: |
        Generate a collated PDF for a given request and get a temporary download URL.
        **Authentication:** Same as the rest of the API (API key e.g. `Authorization: Basic <base64(apiKey:)>` or `?api_key=...`, or OAuth Bearer token). The authenticated user must have **requests-download** permission for the request.
        **Default export (templateId omitted):** All uploaded documents for that request, in item order. Forms are not included.
        **Custom template (templateId set):** Export follows the template (documents, static pages, PDFs, forms, order, "do not include if form has no answers", etc.). Template IDs are shown in the app in "Manage your PDF exports" (list and in the template detail modal when editing).
        The client should use the returned `url` with a simple GET (e.g. redirect or fetch) to download the PDF. The link is valid for 15 minutes; after that a new export must be requested.
      parameters:
        - name: requestId
          in: path
          required: true
          description: ID of the request to export.
          schema:
            type: string
        - name: templateId
          in: query
          required: false
          description: |
            ID of the export template to use. If omitted, the default export is used (all uploaded documents in item order, no forms).
            Custom template IDs are shown in the app in "Manage your PDF exports".
          schema:
            type: string
      responses:
        '200':
          description: Pre-signed URL to download the generated PDF.
          content:
            application/json:
              schema:
                type: object
                required:
                  - url
                  - expiresIn
                properties:
                  url:
                    type: string
                    description: Pre-signed S3 URL to download the generated PDF.
                  expiresIn:
                    type: integer
                    description: Validity of the URL in seconds (always 900, i.e. 15 minutes).
                    example: 900
              example:
                url: https://collecttempseu.s3.eu-west-3.amazonaws.com/export-abc123.pdf?X-Amz-Algorithm=...
                expiresIn: 900
        '400':
          description: Nothing to export (e.g. template results in an empty list, or export not supported for this storage).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 400
                  message:
                    type: string
                    description: Reason for the error
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden — user not allowed to download this request (e.g. missing requests-download permission).
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
        '404':
          description: Not found — invalid or unknown requestId, or template not found when templateId is provided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 404
                  message:
                    type: string
                    description: 'Not found, or "Export template not found" when templateId is invalid.'
        '429':
          $ref: '#/components/responses/429'
        '500':
          description: Server or Lambda error during export or URL generation.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 500
                  message:
                    type: string
                    description: Error reason
        '503':
          $ref: '#/components/responses/503'
  '/elements/{elementId}':
    get:
      tags:
        - Elements
      operationId: get-a-specific-element
      summary: Get a specific element
      description: This endpoint retrieves all the details of a specific element including the answers of the forms and the documents that have been uploaded.
      parameters:
        - name: elementId
          in: path
          required: true
          description: The ID of the element to retrieve
          schema:
            type: string
        - name: expires
