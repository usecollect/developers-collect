                    description: Status of the signature element
                    enum: [not-sent, sent, signed, rejected]
                  type:
                    type: string
                    description: Element type
                    enum: [sign]
                  request:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: Request ID
                      campaignId:
