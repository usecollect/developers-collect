  /request:
    post:
      tags:
        - Requests
      operationId: send-a-new-request
      summary: Send a new request
      description: This endpoint allows you to send a new request to a new contact or to an existing contact.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                campaignId:
                  type: string
                  description: The ID of the campaign you want to use to send a request.
                contact:
                  description: |
                    The contact can be a string representing the ID of an existing contact or a contact object in JSON format ([click here for more details](https://bump.sh/adelivet/doc/collectdraft/operation/operation-add-contact)).
                  $ref: '#/components/schemas/ContactMultipleRequest'
                items:
                  description: 'An array of itemId. If you want to request only few elements of the campaign, you can optionaly specify which elements you want to include in your request.'
                  type: array
                  items:
                    type: string
                esignDocs:
                  type: array
                  description: |
                    Array of documents to be uploaded for e-signature. Each document must be associated with a sign element and can be provided via URL or base64 encoded data.
                    The file size is limited to 20Mb per document regardless of the upload method chosen.
                  items:
                    type: object
                    required:
                      - itemId
                      - name
                    properties:
                      itemId:
                        type: string
                        description: ID of the sign element you want to upload the document to
                      name:
                        type: string
                        description: Name of the file with the file extension
                      url:
                        type: string
                        description: URL of the remote file to sign
                      data:
                        type: string
                        description: Base64 encoded file
                    oneOf:
                      - title: Remote URL
                        type: object
                        required: [itemId, name, url]
                        properties:
                          itemId:
                            type: string
                            description: ID of the sign element you want to upload the document to
                          name:
                            type: string
                            description: Name of the file with the file extension
                          url:
                            type: string
                            description: URL of the remote file to sign
                      - title: Base64 Data
                        type: object
                        required: [itemId, name, data]
                        properties:
                          itemId:
                            type: string
                            description: ID of the sign element you want to upload the document to
                          name:
                            type: string
                            description: Name of the file with the file extension
                          data:
                            type: string
                            description: Base64 encoded file
                esignTriggers:
                  type: array
                  description: Array of sign element IDs that should be triggered for signature immediately after the request is created
                  items:
                    type: string
                    description: ID of sign element that should be triggered for signature immediately after the request is created
                data:
                  description: An object with custom data that you want to use in your request.
                  type: object
                sample:
                  description: 'An object that represents the sample of a document element. The object must contain 2 parameters: ''itemId'' and ''url''.'
                  type: object
                  properties:
                    itemId:
                      type: string
                    url:
                      type: string
                dueDate:
                  description: 'The due date of the request. The due date should be encoded as a string using ISO 8601 format.'
                  type: string
                createdBy:
                  type: string
