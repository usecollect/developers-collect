    patch:
      tags:
        - Requests
      operationId: update-request-message
      summary: Update Message
      description: |
        Partially update a message. Only provided fields will be updated.

        **Internal messages:** `title` (string), `text` (string or `null` to clear). Same as before.

        **Email messages:** `title` (new subject, min 10 characters), `body` (min 20 characters), `sendOn` (new scheduled date, must be in the future). Rejected for sms.

        **SMS messages:** `body` (min 20 characters), `sendOn` (must be in the future). Title is rejected for sms.

        Email and SMS messages can only be modified while status is **pending** or **paused**. If the message has already been sent or is being sent (sending, sent, opened, clicked), the API returns **409 Conflict**.
      parameters:
        - name: requestId
          in: path
          required: true
          description: The ID of the request
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          description: The ID of the message
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 10
                  description: New title. For internal and email only; rejected for sms. For email, min 10 characters.
                text:
                  type: string
                  nullable: true
                  description: New text for internal channel. Can be `null` to clear. Supports markdown.
                body:
                  type: string
                  minLength: 20
                  description: New message body for email and sms. Min 20 characters.
                sendOn:
                  type: string
                  format: date-time
                  description: New scheduled date for email/sms. Must be in the future.
            example:
              title: AI Agent - follow-up sent
              text: Updated body text...
      responses:
        '200':
          description: Message updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              example:
                id: msg_123
                requestId: req_456
                channel: internal
                title: AI Agent - follow-up sent
                text: Updated body text...
                createdAt: '2026-01-21T10:12:46.120Z'
                updatedAt: 2026-01-21T10:20:01.900Z
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          description: Message has already been sent and cannot be modified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: integer
                    example: 409
                  message:
                    type: string
                    example: Message has already been sent and cannot be modified
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
