  /campaigns:
    get:
      tags:
        - Campaigns
      operationId: list-all-campaigns
      summary: List all campaigns
      description: This endpoint retrieves all the campaigns.
      parameters:
        - name: offset
          in: query
          description: Specify the ranking number of the first item on the page. Used for pagination.
          schema:
            type: integer
        - name: limit
          in: query
          description: 'Specify how many results to return. Default is 50 campaigns, maximum is 100 campaigns.'
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: showArchives
          in: query
          description: Specify if the archived campaigns should be included or not. Default is false.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of campaigns.
          content:
            application/json:
              schema:
