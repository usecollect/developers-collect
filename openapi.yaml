                  status: due
                  dueDate: 2024-06-12T22:59:00.000Z
                  privacy: team
                  contact:
                    _id: uBJadNFcjrC6emRom
                    email: erlich.bachman@example.com
                    firstName: Erlich
                    lastName: Bachman
                    company: Bachmanity
                    nbRequest: 11
                    tag: []
                    custom:
                      - _id: yw6XDyeFvbqr86yA6
                        name: Favorite color
                        variable: color
                        value: Blue
                      - _id: CqdFwGX3yitk9zf8z
                        name: Country
                        variable: country
                        value: US
                    createdAt: 2024-11-22T13:40:26.591Z
                    lastActivity: 2024-06-17T17:14:52.498Z
                  branding:
                    useBranding: true
                    brandingId: jSEj7vHk3wLG3gRF7
        '400':
