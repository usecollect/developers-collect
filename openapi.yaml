    post:
      tags:
        - Requests
      operationId: send-multiple-requests
      summary: send multiple requests
      description: This endpoint allows you to send multiple requests to new contacts or existing contacts.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                campaignId:
                  type: string
                  description: The ID of the campaign you want to send a request.
                contacts:
                  type: array
                  items:
                    $ref: '#/components/schemas/ContactMultipleRequest'
                  description: | 
                    An array of the contacts you want to send the request to. You can send requests up to 50 contacts per API call (considering your account's limitation). Each contact can be a string representing the ID of an existing contact or a contact object in JSON format. ([click here for more details](https://bump.sh/adelivet/doc/collectdraft/operation/operation-add-contact))
                items:
                  description: ' An array of itemId. If you want to request only few items (documents and forms) of the campaign, you can optionaly specify which items you want to retrieve.'
                  type: array
                  items:
                    type: string
                samples:
                  description: 'An array of object. Each object represents the sample of a document element. The object must contain 2 parameters: ''itemId'' and ''url''.'
                  type: object
                  properties:
                    itemId:
                      type: string
                    url:
                      type: string
                dueDate:
                  description: 'The due date of the request. The due date should be encoded as a string using ISO 8601 format.'
                  type: string
                assignedTo:
                  description: 'The ID of the team member you want to assign the request to. You can also use the email address of the team member.'
                  type: string
                sendMessage:
                  description: 'Boolean. If set to false, the sequence of messages planned in your campaign will not be sent.'
                  type: boolean
                sendCompletionMessage:
                  description: 'Boolean. If set to true, a message will be automatically send when the request status will be changed to "completed". This message can be customized in the branding settings used for this campaign.'
                  type: boolean
                sendRejectionMessage:
                  description: 'Boolean. If set to true, a message will be automatically send when the request status will be changed to "pending" and at least one element on the portal has been rejected. This message can be customized in the branding settings used for this campaign.'
                  type: boolean
                sendReopenMessage:
                  description: 'Boolean. If set to true, a message will be automatically send when the request status will be changed to "pending". This message can be customized in the branding settings used for this campaign.'
                  type: boolean
              required:
                - campaignId
                - contacts
            example: 
              campaignId: xvr69EYLKXvTkfYuk
              contacts: 
                - WmTjsFknzHdmfs3Ra
                - email: dinesh.chugtai@example.com
                  firstName: Dinesh
                  lastName: Chugtai
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/CampaignRequest'
                  contacts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactMultipleResponse'
                  errors:
                    type: array
                    items: {}
              example: 
                requests: 
                  - _id: nw42MmBsJoccgutST
                    campaignId: xvr69EYLKXvTkfYuk
                    createdAt: 2024-12-04T07:20:06.085Z
                    portalUrl: https://app.usecollect.com/portal/uGFRDeEL3Ct2uYo2c/nw42MmBsJoccgutST/c/Kx9mN2pQ7vR4wE8s
                    status: pending
                    dueDate: 2024-12-11T21:59:00.000Z
                    privacy: private
                    contact:
                      _id: WmTjsFknzHdmfs3Ra
                      email: richard.hendricks@example.com
                      firstName: Richard
                      lastName: Hendricks
                      nbRequest: 5
                      createdAt: 2024-12-03T13:51:27.666Z
                      lastActivity: 2024-12-04T07:20:06.080Z
                    branding:   
