  '/requests/{requestId}':
    get:
      tags:
        - Requests
      operationId: get-a-specific-request
      summary: Get a specific request
      description: |
        This endpoint retrieves all the details of a specific request including the answers of the forms and the documents that have been uploaded.

        **Document uploads:** Each document in `documents[].uploads[]` includes `id`, `name`, `createdAt`, and other metadata. When an upload is downloadable, a temporary `url` is provided. When an upload is not downloadable (e.g. archived or expired), it still appears in the list with `status` set to `archived` or `expired` and **no `url` field** — the document cannot be downloaded via the API in those cases. Uploads in quarantine also omit `url`.
      parameters:
        - name: requestId
          in: path
          required: true
          description: The ID of the request to retrieve.
          schema:
            type: string
        - name: expires
          in: query
          description: |
            Specify the period of validity of the url to access the uploaded documents. Should be an integer, default is `900` (15 minutes) and maximum is `3600` (1 hour).
          schema:
            type: integer
          example:
            requestId: NxAHPWu9hRzcyD24m
      responses:
        '200':
          description: Specific Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificRequest'
              example:
                _id: NxAHPWu9hRzcyD24m
                campaignId: mYCsdgB4DQoENBaX6
                createdAt: 2024-01-22T13:40:26.671Z
                portalUrl: https://app.usecollect.com/portal/uGFRDeEL3Ct2uYo2c/NxAHPWu9hRzcyD24m/c/NxAHPWu9hRzcyD24m
