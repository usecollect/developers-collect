openapi: 3.0.1
x-stoplight:
  id: 12dab89109ded
info:
  title: Collect API
  version: '1.0'
  description: |
    Welcome to Collect Developer documentation. 
    
    The Collect REST API is a collection of HTTPS endpoints to enable any application that supports HTTPS requests to send and receive data from a Collect account.
servers:
  - url: 'https://api.usecollect.com/v1'
    description: Production server.
security:
  - basicAuth: []
tags:
  - name: Teams
  - name: Users
  - name: Campaigns
  - name: Requests
  - name: Elements
  - name: Contacts
  - name: Webhooks
    description: |
      You can configure webhook endpoints via the API to be notified about events that happen in your Collect account.
      
      **Notes:**
      
      Collect attempts to deliver your webhooks for 24 hours with an exponential back off. After this timing, your webhook will automatically be paused.
paths:
  /team:
    get:
      tags:
        - Teams
      operationId: get-team-information
      summary: Get Team Information
      description: This endpoint retrieves information of your team.
      responses:
        '200':
          description: Information of your team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /users:
    get:
      tags:
        - Users
      operationId: list-all-users
      summary: List all users
      description: This endpoint retrieves all the users in your team.
      responses:
        '200':
          description: List of users in your team.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example: 
                - _id: upKywNKgwyHx3hKfF
                  role: admin
                  status: active
                  email: richard.hendricks@example.com
                  firstName: Richard
                  lastName: Hendricks
                - _id: ABx6DYtqExcgJ4FAX
                  role: member
                  status: active
                  email: erlich.bachman@example.com
                  firstName: Erlich
                  lastName: Bachman
                - _id: uSw8YyNuwhGmqEEKc
                  role: member
                  status: active
                  email: dinesh.chugtai@example.com
                  firstName: Dinesh
                  lastName: Chugtai
                - _id: RQEPygugi3Nk9Sudm
                  role: member
                  status: active
                  email: gilfoyle@example.com
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '503':
          $ref: '#/components/responses/503'
  /user:
    get:
      tags:
        - Users
      operationId: get-a-specific-user
      summary: Get a specific user
      description: This endpoint retrieves a specific user in your team. You can search by user ID or by email.
      parameters:
        - name: id
          in: query
          description: Use this parameter if you want to search by user ID.
          schema:
            type: string
        - name: email
          in: query
          description: Use this parameter if you want to search a user by email.
          schema:
            type: string
      responses:
        '200':
          description: A specific user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                _id: upKywNKgwyHx3hKfF
                role: admin
                status: active
                email: richard.hendricks@example.com
                firstName: Richard
                lastName: Hendricks
        '400':
