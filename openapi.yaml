    post:
      tags:
        - Elements
      operationId: upload-sign-document
      summary: Upload document for e-signature
      description: |
        This endpoint allows you to upload a document to an e-sign element for signature. You can upload a remote file using the `url` parameter or a file encoded in base64 using the `data` parameter.
        
        The file size is limited to 20Mb regardless of the upload method chosen.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - elementId
                - name
              properties:
                elementId:
                  type: string
                  description: ID of the e-sign element you want to add the document to
                url:
                  type: string
                  description: URL of the remote file to sign. The file size is limited to 20Mb.
                data:
                  type: string
                  description: Base64 encoded file. The file size is limited to 20Mb.
                name:
                  type: string
                  description: Name of the file **with** the file extension.
            example:
              elementId: CdXhhTe59xPNqJDMh
              name: partnership_agreement.pdf
              data: JVBERi0xLjQKJdPr6eEKMSAwIG9iago8PC9UaXRsZSAoTmV3IGRvYyB0byBzaWduKQovUHJvZHVjZXIgKFNraWEvUERGIG0xMTQgR29vZ2xlIERvY3MgUmVuZGVyZXIpPj4KZW5kb2JqCjMgMCBvYmoKPDwvY2EgMQovQk0gL05vcm1....
      responses:
        '200':
          description: Successfully uploaded document for signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Element ID
                  itemId:
                    type: string
                    description: Reference of the element in the campaign
                  name:
                    type: string
                    description: Element name
                  order:
                    type: integer
                    description: Element order
                  visibility:
                    type: boolean
                    description: Visibility of the element on the portal
                  visibilityConditionnal:
                    type: boolean
                    description: Whether the visibility is conditional
                  status:
                    type: string
                    description: Status of the signature element
                    enum: [not-sent, sent, signed, rejected]
                  type:
                    type: string
                    description: Element type
                    enum: [sign]
                  request:
                    type: object
                    properties:
                      _id:
                        type: string
                        description: Request ID
                      campaignId:
                        type: string
                        description: Campaign ID
              example:
                id: CdXhhTe59xPNqJDMh
                itemId: a3qRLd684bWLt3a5s
                name: Partnership Agreement
                order: 0
                visibility: true
                visibilityConditionnal: true
                status: not-sent
                type: sign
                request:
                  _id: 3SBSzkmEMqitQY9ot
                  campaignId: SXwNhaTXzcjoYx9Ea
