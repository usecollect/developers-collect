components:
  schemas:
    CreateContact:
      type: object
      required:
        - email
        - company
      properties:
        firstName:
          type: string
          description: First name of the contact
        lastName:
          type: string
          description: Last name of the contact
        email:
          type: string
          description: Email of the contact
        company:
          type: string
          description: Company name of the contact
        tag:
          type: array
          description: List of tags for the contact
          items:
            type: string
        customFields:
          $ref: '#/components/schemas/Custom'
    ModifyContact:
      type: object
      required:
        - company
      properties:
        firstName:
          type: string
          description: First name of the contact
        lastName:
          type: string
          description: Last name of the contact
        email:
          type: string
          description: Email of the contact
        company:
          type: string
          description: Company name of the contact
        tag:
          type: array
          description: List of tags for the contact
          items:
            type: string
        customFields:
          $ref: '#/components/schemas/Custom'
    ContactRequest:
      type: object
      properties:
        _id:
          type: string
        campaignId:
          type: string
        createdAt:
          type: string
        status:
          type: string
        privacy:
          type: string
        branding:
          $ref: '#/components/schemas/Branding'
        note:
          type: object
          properties:
            date:
              type: string
            note:
              type: string
    AddWebhookResponse:
      type: object
      properties:
        _id:
          type: string
        targetUrl:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        types:
          type: array
          items:
            type: string
            enum:
              - created
              - statusChanged
              - portalSubmited
              - dueDateChanged
              - portalViewed
              - docUploaded
              - docDeleted
              - docParsed
              - itemApproved
              - itemRejected
              - itemReopened
              - itemCancelValidation
              - formSubmited
              - emailSent
              - emailClicked
              - emailBounced
              - emailOpened
              - emailMarkedAsSpam
              - emailBlocked
              - emailUnsub
              - smsSent
              - smsDelivered
              - smsClicked
              - smsFailed
              - smsUndelivered
        campaignId:
          type: string
          description: We'll call this endpoint only for this campaignId.
        secretToken:
          type: string
          description: 'If you specify a secret token, it will be sent with the hook request in the HTTP header.'
    AddWebhookRequest:
      type: object
      required:
        - targetUrl
      properties:
        targetUrl:
          type: string
          description: The URL of the webhook endpoint.
        types:
          type: array
          description: The list of events to enable for this endpoint.
          items:
            type: string
            enum:
              - created
              - statusChanged
              - portalSubmited
              - dueDateChanged
              - portalViewed
              - docUploaded
              - docDeleted
              - docParsed
              - itemApproved
              - itemRejected
              - itemReopened
              - itemCancelValidation
              - formSubmited
              - emailSent
              - emailClicked
              - emailBounced
              - emailOpened
              - emailMarkedAsSpam
              - emailBlocked
              - emailUnsub
              - smsSent
              - smsDelivered
              - smsClicked
              - smsFailed
              - smsUndelivered
        campaignId:
          type: string
          description: We'll call this endpoint only for this campaignId.
        secretToken:
          type: string
          description: 'If you specify a secret token, it will be sent with the hook request in the HTTP header.'
    Webhook:
      type: object
      properties:
        _id:
          type: string
          description: Unique identifier of the webhook
        targetUrl:
          type: string
          description: URL to which the webhook will send the data
        status:
          type: string
          description: Status of the webhook
        createdAt:
          type: string
          format: date-time
          description: Creation date of the webhook
        secretToken:
          type: string
          description: Secret token of the webhook
        campaignId:
          type: string
          description: Unique identifier of the campaign associated with the webhook
        types:
          type: array
          items:
            type: string
            description: Types of events that trigger the webhook
    ModifyCommonElements:
      type: object
      properties:
        elementId:
          type: string
          description: The ID of the element you want to modify.
        name:
          type: string
          description: Name of the element.
        order:
          type: integer
          description: Order of the element on the portal. Order should be an integer and starts at 0.
        visibility:
          type: boolean
          description: Define is this element is visible on the portal. Default is true.
    ModifyElement:
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/ModifyCommonElements'
            - type: object
              title: Document
              properties:
                status:
                  type: string
                  description: 'The new status of the element. Can be one of the predifined status open, waiting, approved,rejected.'
                  enum:
                    - open
                    - waiting
                    - approved
                    - rejected
                reason:
                  type: string
                  description: 'If the new status is rejected, you can specify a reason that will be displayed on the portal.'
                description:
                  type: string
                  description: Description of the document that needs to be uploaded
                nickname:
                  type: string
                  description: A nickname for this element. Can be useful to classify your uploaded docs.
                path:
                  type: string
                  description: A path for this element. Can be useful to classify your uploaded docs.
                mandatory:
                  type: boolean
                  description: Is the document mandatory or not. Default is true.
                extensions:
                  type: array
                  description: 'A list of document extensions that are accepted. By default, all type of documents are accepted. Must be formated as a string like [''xls'',''xslx''].'
                  items:
                    type: string
                multipleupload:
                  type: boolean
                  description: Specify if you are accepting multi documents for the same element. Default is true.
              required:
                - elementId
        - allOf:
            - $ref: '#/components/schemas/ModifyCommonElements'
            - type: object
              title: Page                
        - allOf:
            - $ref: '#/components/schemas/ModifyCommonElements'
            - type: object
              title: Text
              properties:
                text:
                  type: string
                  description: A string containing the HTML that you want to display.
        - allOf:
            - $ref: '#/components/schemas/ModifyCommonElements'
            - type: object
              title: Form
        - allOf:
            - $ref: '#/components/schemas/ModifyCommonElements'
            - type: object
              title: Sign
    UploadFile:
      type: object
      required:
        - elementId
        - name
      properties:
        elementId:
          type: string
          description: 'ID of the doc element you want to upload the file to'
        url:
          type: string
          description: URL of the remote file. The file size is limited to 20Mb.
        data:
          type: string
          description: Base64 encoded file. The file size is limited to 20Mb.
        name:
          type: string
          description: |
            Name of the file **with** the file extension.
    AddElement:
      oneOf:
        - allOf:
            - $ref: '#/components/schemas/CommonElements'
            - $ref: '#/components/schemas/Docs'
        - allOf:
            - $ref: '#/components/schemas/CommonElements'
            - type: object
              title: Text
              properties:
                name:
                  type: string
                  description: 'Name of the text block. This name is not displayed on the portal, it''s only used in your own interface. Default is Text block.'
                  default: Text block
                text:
                  type: string
                  description: A string containing the HTML that you want to display.
        - allOf:
            - $ref: '#/components/schemas/CommonElements'
            - type: object
              title: Page
              properties:
                name:
                  type: string
                  description: 'Name of the page.'
                  default: New page
    CommonElements:
      type: object
      required:
        - requestId
        - type
      properties:
        requestId:
          type: string
        type:
          description: 'Type of the element. Can be docs, text and pages.'
          type: string
          enum:
            - docs
            - text
            - pages
        name:
          description: Name of the element.
          type: string
        order:
          description: Order of the element on the portal. Order should be an integer and starts at 0.
          type: integer
          minimum: 0
    Docs:
      type: object
      title: Document
      properties:
        description:
          description: Description of the document that needs to be uploaded.
          type: string
        nickname:
          description: A nickname for this element. Can be useful to classify your uploaded docs.
          type: string
        path:
          description: A path for this element. Can be useful to classify your uploaded docs.
          type: string
        mandatory:
          description: Is the document mandatory or not. Default is true.
          type: boolean
        extensions:
          description: 'A list of document extensions that are accepted. By default, all type of documents are accepted. Must be formated as a string like [''xls'',''xslx''].'
          type: array
          items:
            type: string
        multipleupload:
          description: Specify if you are accepting multi documents for the same element. Default is true.
          type: boolean
    Element:
      oneOf:
        - title: Document
          type: object
          properties:
            id:
              type: string
              description: Element ID
            itemId:
              type: string
              description: Reference of the element in the campaign
            name:
              type: string
              description: Element name
            order:
              type: integer
              description: Element order
