  /requests:
    get:
      tags:
        - Requests
      operationId: list-all-the-requests-of-a-campaign
      summary: List all the requests of a campaign
      description: This endpoint retrieves all the requests of a campaign.
      parameters:
        - name: campaignId
          in: query
          required: true
          description: Specify the ID of the campaign to retrieve.
          schema:
            type: string
          example: mYCsdgB4DQoENBaX6
        - name: offset
          in: query
          description: Specify the ranking number of the first item on the page. Used for pagination.
          schema:
            type: integer
          example: 0
        - name: limit
          in: query
          description: 'Specify how many results to return. Default is 50 campaigns, maximum is 100 campaigns.'
          schema:
            type: integer
            default: 50
            maximum: 100
          example: 25
        - name: filter
          in: query
          description: | 
            Filter requests by status. If not specify, will return all the requests except request cancelled, archived and the drafts.
            Below you will find the data dictionary for the status attribute.
            
            | Status | Description |
            | ------ | ----------- |
            | pending | The request has been sent and is not completed. |
            | completed | The request has been sent, all the documents have been uploaded and the forms submitted. If validation is opted-in, the documents and data have been validated too. |
            | due | The request has been sent, is not completed and is due. |
            | waiting | The request has been sent, all the documents have been uploaded and the forms submitted but they have not been validated by the user. |
            | archived | The request has been archived. |
            | cancelled | The request has been cancelled. |
            | error | An error happened when we sent the request. |

            > info
            > You can also use custom status here.
            
          schema:
            type: string
          example: pending
        - name: search
          in: query
          description: | 
            String to look up. We will search into the contact first name, contact last name, contact email and all the custom data.
          schema:
            type: string
          example: pending
      responses:
        '200':
          description: List of requests of a campaigns.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampaignRequest'
              example:
