  responses:
    '400':
      description: Bad Request -- Your request is invalid.
    '401':
      description: Unauthorized -- Your API key is wrong.
    '403':
      description: Forbidden -- The object requested is hidden for administrators only.
    '404':
      description: Not Found -- The specified object could not be found.
    '429':
      description: Too Many Requests -- You're requesting too many objects! Slow down!
    '500':
      description: Internal Server Error -- We had a problem with our server. Try again later.
    '503':
      description: Service Unavailable -- We're temporarily offline for maintenance. Please try again later.
  securitySchemes:
    basicAuth:     # <-- arbitrary name for the security scheme
      type: http
      scheme: basic
      description: |
        Collect uses API keys to allow access to the API. You can retrieve your Collect API key at the bottom of your [profile page](https://app.usecollect.com/settings/profile).
        
        You need to add the Authorization header using the Basic authentication type. `username:password` where the username is always empty and the password is the API key.
        
        > info
        > Don't forget to add the semicolon ( : ) before your API key in curl command.