    Upload:
      type: object
      description: |
        A document upload within a request. When the upload is downloadable, `url` is present.
        When the upload is not downloadable (archived, expired, or in quarantine), `url` is omitted.
        Sensitive documents may include `restricted: true` and still have a `url` with access restrictions.
      properties:
        id:
          type: string
          description: Unique identifier of the upload
        createdAt:
          type: string
          format: date-time
          description: Timestamp of when the upload was created
        name:
          type: string
          description: Upload name
        url:
          type: string
          description: |
            Temporary URL to download the file. Present only when the document is downloadable.
            Omitted when `status` is `archived` or `expired`, or when the file is in quarantine.
            Validity period can be set via the `expires` query parameter (default 15 minutes, max 1 hour).
        status:
          type: string
          enum:
            - archived
            - expired
          description: |
            When present, indicates why the document is not downloadable. `archived` — file has been archived;
            `expired` — file or link has expired. When `status` is `archived` or `expired`, `url` is not included.
        size:
          type: integer
          description: Upload size in bytes
        quarantine:
          type: boolean
          description: When true, the file failed virus scan or policy check; `url` is not included.
        restricted:
          type: boolean
          description: When true, the document is sensitive and access may be restricted.
        virusScanned:
          type: boolean
          description: Whether the upload has been virus-scanned
        scannedOn:
          type: string
          format: date-time
          description: Timestamp of the last virus scan
